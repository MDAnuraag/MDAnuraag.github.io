---
layout: default
---

<article class="post">
  <header class="post-header">
    <h1 class="post-title">{{ page.title }}</h1>
    {% if page.status %}
      <span class="status-badge status-{{ page.status }}">{{ page.status }}</span>
    {% endif %}
  </header>

  <div class="post-content" style="max-width: 820px;">
    {{ content }}
  </div>
</article>
